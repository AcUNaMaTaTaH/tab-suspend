<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>💤 Suspended</title>
    <link id="favicon" rel="icon" href="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            color: white;
            background-color: #121212;
        }

        body {
            overflow: hidden;
        }

        #backdrop {
            position: fixed;
            inset: 0;
            background: #121212;
            z-index: 1;
        }

        #content {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 7vh 16px 24px;
            box-sizing: border-box;
        }

        .overlay {
            width: 100%;
            max-width: 760px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 24px;
            position: relative;
            border-radius: 14px;
            backdrop-filter: blur(4px);
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 18px 50px rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.06);
        }

        #pageTitle {
            font-size: 1.4em;
            color: #cccccc;
            margin: 0 auto 16px;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        h2 {
            font-size: 18px;
            margin: 0 0 14px;
            font-weight: 600;
        }

        p {
            margin: 0 0 10px;
        }

        a {
            color: #7dd3fc;
            font-size: 1.1em;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        #suspendShortcut {
            display: inline-block;
            margin-top: 2px;
            color: #c9c9c9;
        }

        kbd2 {
            background: #444444;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 1em;
        }

        .preview {
            display: none;
            margin: 20px auto 0;
            width: 100%;
            max-width: 680px;
            aspect-ratio: 16 / 9;
            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 12px 40px rgba(0,0,0,0.35);
            background-color: rgba(255,255,255,0.03);
        }
    </style>
</head>
<body>
    <div id="backdrop"></div>

    <div id="content">
        <div class="overlay">
            <h3 id="pageTitle"></h3>

            <h2>This tab is suspended.</h2>
            <p><a id="restoreLink" href="#">Click to restore</a></p>
            <span id="suspendShortcut">Or press <kbd2>ENTER</kbd2> or <kbd2>CTRL + ALT + S</kbd2></span>

            <div id="screenshotPreview" class="preview"></div>
        </div>
    </div>

    <script src="suspended.js"></script>
</body>
</html>
