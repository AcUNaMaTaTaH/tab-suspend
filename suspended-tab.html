<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>💤 Suspended</title>
    <link id="favicon" rel="icon" href="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            color: white;
            background-color: #121212;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            transition: background-image 0.3s ease-in-out;
        }

        h2 {
            font-size: 18px;
            margin-top: 5px;
            margin-bottom: 20px;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 2rem;
            display: inline-block;
            position: relative;
            z-index: 2;
            border-radius: 10px;
            backdrop-filter: blur(3px);
        }

        #content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding-top: 14vh;
            padding-left: 16px;
            padding-right: 16px;
        }

        a {
            color: #7dd3fc;
            font-size: 1.2em;
            text-decoration: none;
        }

        #backdrop {
            position: fixed;
            inset: 0;
            background: #121212;
            z-index: 1;
        }

        .preview {
            margin: 2rem auto 0;
            width: 640px;
            max-width: 92vw;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 12px 40px rgba(0,0,0,0.35);
        }

        kbd2 {
            background: #444444;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 1em;
        }

        #pageTitle {
            font-size: 1.5em;
            color: #cccccc;
            margin: 20px auto;
            max-width: 700px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div id="backdrop"></div>

    <div id="content">
        <h3 id="pageTitle"></h3>

        <div class="overlay">
            <h2>This tab is suspended.</h2>
            <p><a id="restoreLink" href="#">Click to restore</a></p>
            <span id="suspendShortcut">Or press <kbd2>ENTER</kbd2> or <kbd2>CTRL + ALT + S</kbd2></span>
        </div>

        <div id="screenshotPreview" class="preview"></div>
    </div>

    <script src="suspended.js"></script>
</body>
</html>
